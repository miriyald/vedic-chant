server {
    listen 8080;
    server_name _;

    root /app/web;
    index index.html;

    # Serve static files; fall back to index.html for SPA-style navigation
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access logs for favicon to reduce noise
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
